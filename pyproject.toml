[project]
name = "quantum-trader-agent"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "cryptography>=42,<46",
    "pandas>=2.1",
    "numpy>=1.26",
    "pyarrow>=14.0",
    "pydantic>=2.0",
    "python-dotenv>=1.0",
    "pyyaml>=6.0",
    "requests>=2.31",
    "scikit-learn>=1.4",
    "scipy>=1.10",
    "websocket-client>=1.7,<2.0",
]

[project.optional-dependencies]
dev = [
    "freezegun",
    "pandas-ta",
    "pytest>=8.0",
    "pytest-cov",
    "responses>=0.25",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "."]
markers = [
    "integration: requires network/secrets (default skipped)",
    "slow: long-running benchmarks (default skipped; run with -m slow)",
]
addopts = "-m 'not integration and not slow'"
