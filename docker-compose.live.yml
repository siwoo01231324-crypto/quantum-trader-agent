# Issue #133 Phase 2 KIS 모의계좌 4주 운영 컨테이너 구성 (로컬 PC + Docker Desktop).
#
# 기존 docker-compose.yml (prometheus/grafana monitoring stack, Phase 1) 과 분리된 운영 전용 파일.
# Phase 2 결정: prometheus/grafana 미설치, Telegram + 파일 로그만 (1인 운영, ARM 미가용 폴백).
#
# 3 service:
#   live-daemon       - scripts/live_run.py (KIS 모의계좌 + AsyncOrderRouter)
#   report-cron       - scripts/cron_loop.sh (KST 16:00 일일 리포트 + Telegram 요약)
#   telegram-notifier - scripts/telegram_alert.py --watch (WAL tail kill-switch/mode_switched 알림)
#
# 사용법 (메인 repo 또는 워크트리 root 에서 동일):
#   docker compose -f docker-compose.live.yml build
#   docker compose -f docker-compose.live.yml up -d
#   docker compose -f docker-compose.live.yml logs -f live-daemon
#   docker compose -f docker-compose.live.yml ps
#   docker compose -f docker-compose.live.yml down            # graceful stop (WAL flush)
#
# .env 위치: ./.env (compose 파일과 같은 디렉토리. 메인 repo 에서도 워크트리에서도 동일).
# 필수 변수 (전체 목록은 docs/work/active/000133-phase2-operation/SECRETS.md):
#   HANTOO_FAKE_API_KEY, HANTOO_FAKE_SECRET_API_KEY, HANTOO_FAKE_CREDIT_NUMBER
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
#   (선택) MAX_ORDERS=30  - 첫 1주 보수 운영 (default 30, 풀 운영 시 환경변수 재정의)

services:
  live-daemon:
    build:
      context: .
      dockerfile: Dockerfile
    image: qta-phase2:latest
    container_name: qta-live-daemon
    command:
      - "scripts/live_run.py"
      - "--broker=kis-paper-shadow"
      - "--symbols=005930,035720,000660"  # 삼전 + 카카오 + SK하이닉스 (#133 결정)
      - "--duration=4w"
      - "--max-orders=${MAX_ORDERS:-30}"
      - "--auto-fallback"
      - "--schedule=krx"
      - "--log-dir=/data/logs"
    env_file:
      - ./.env
    environment:
      TZ: Asia/Seoul
      KIS_PAPER: "true"
      KIS_FILL_MISSING_HALT_THRESHOLD: "${KIS_FILL_MISSING_HALT_THRESHOLD:-1}"
    volumes:
      - ./logs/shadow:/data/logs
      - ./data/state:/app/.omc/state  # token cache + process lock
    restart: unless-stopped
    healthcheck:
      # ProcessLock 파일 존재 = daemon alive
      test: ["CMD-SHELL", "find /data/logs -name '.live_loop.lock' | grep -q ."]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G

  # #231 S1 — Binance testnet shadow live-daemon (별도 컨테이너).
  # KIS daemon 과 process / WAL / lock 모두 분리. 한쪽 fault 가 영향 0.
  # 시세: BinancePublicFeed (24/7), 거래소 게이트 없음 (--schedule=always).
  # 종목: BTCUSDT/ETHUSDT/ETHBTC/SOLUSDT 등 — momo-btc-v2, momo-vol-filtered,
  # meanrev-pairs 3 strategy 활성화 (#231 AC0_broker_coverage).
  live-daemon-binance:
    build:
      context: .
      dockerfile: Dockerfile
    image: qta-phase2:latest
    container_name: qta-live-daemon-binance
    command:
      - "scripts/live_run.py"
      - "--broker=binance-testnet-shadow"
      - "--symbols=${BINANCE_SYMBOLS:-BTCUSDT,ETHUSDT,ETHBTC,SOLUSDT}"
      - "--duration=4w"
      - "--max-orders=${BINANCE_MAX_ORDERS:-30}"
      - "--auto-fallback"
      - "--schedule=always"
      - "--feed=binance"
      - "--log-dir=/data/logs"
      - "--no-browser"
      - "--dashboard-port=0"  # KIS daemon 이 8000 점유, binance daemon 은 dashboard 비활성
    env_file:
      - ./.env
    environment:
      TZ: Asia/Seoul
      # Binance testnet creds (fallback chain — live_run._build_binance_adapter)
      # BINANCE_DEMO_API_KEY / BINANCE_TESTNET_API_KEY / BINANCE_API_KEY
    volumes:
      # logs/lock 디렉토리 분리 — KIS daemon 의 ProcessLock 과 충돌 방지
      - ./logs/shadow-binance:/data/logs
      - ./data/state-binance:/app/.omc/state
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "find /data/logs -name '.live_loop.lock' | grep -q ."]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G

  # 2026-06-05 P5/P7 — Bitget USDT-M Futures live daemon. Binance 와 병행
  # 가동 가능 (다른 컨테이너 / 다른 log+lock 경로). Demo (default) 는 wspap
  # 서브도메인 + paptrading 헤더로 자동 라우팅. 메인넷 전환은 --broker=
  # bitget-mainnet + BITGET_API_KEY/SECRET/PASSPHRASE env.
  #
  # 가동:
  #   docker compose -f docker-compose.live.yml build live-daemon-bitget
  #   docker compose -f docker-compose.live.yml up -d live-daemon-bitget
  #   docker compose -f docker-compose.live.yml logs -f live-daemon-bitget
  #
  # 종목: short-whitelist active 14종 (P0/P5 정리 — RIFUSDT 제외, SHIBUSDT
  # rename) + kst-hours 의 top-100 dynamic. live_run.py 가 universe-quote
  # provider 에서 1000* 종목 자동 정규화.
  live-daemon-bitget:
    build:
      context: .
      dockerfile: Dockerfile
    image: qta-phase2:latest
    container_name: qta-live-daemon-bitget
    command:
      - "scripts/live_run.py"
      - "--broker=${BITGET_BROKER_MODE:-bitget-demo}"
      - "--symbols=${BITGET_SYMBOLS:-BTCUSDT,ETHUSDT,SOLUSDT}"
      - "--duration=4w"
      # #380 — top-100 universe + 20 동시보유 → 일일 주문수 ↑ (진입+청산 round-trip
      # + airborne 100+ fire). 기존 30 은 너무 낮아 조기 HALT. 1000 으로 상향
      # (BITGET_MAX_ORDERS env 로 추가 override / 무제한 원하면 매우 큰 값).
      - "--max-orders=${BITGET_MAX_ORDERS:-1000}"
      - "--auto-fallback"
      - "--schedule=always"
      - "--feed=binance"
      - "--log-dir=/data/logs"
      - "--no-browser"
      - "--dashboard-port=0"
    env_file:
      - ./.env
    environment:
      TZ: Asia/Seoul
      # Demo creds: BITGET_DEMO_API_KEY / BITGET_DEMO_SECRET / BITGET_DEMO_PASSPHRASE
      # Mainnet creds (BITGET_BROKER_MODE=bitget-mainnet 시):
      #   BITGET_API_KEY / BITGET_API_SECRET / BITGET_API_PASSPHRASE
    volumes:
      # Binance daemon / KIS daemon 과 별도 log+state 디렉토리 — ProcessLock
      # 충돌 방지.
      - ./logs/shadow-bitget:/data/logs
      - ./data/state-bitget:/app/.omc/state
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "find /data/logs -name '.live_loop.lock' | grep -q ."]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G

  report-cron:
    build:
      context: .
      dockerfile: Dockerfile
    image: qta-phase2:latest
    container_name: qta-report-cron
    entrypoint: ["/bin/bash", "/app/scripts/cron_loop.sh"]
    env_file:
      - ./.env
    environment:
      TZ: Asia/Seoul
      LOG_DIR: /data/logs
      REPORTS_DIR: /data/reports
      REPORT_HOUR_KST: "16"  # KRX 마감 30분 후
    volumes:
      - ./logs/shadow:/data/logs:ro
      - ./data/reports:/data/reports
    restart: unless-stopped
    depends_on:
      - live-daemon
    deploy:
      resources:
        limits:
          memory: 256M

  telegram-notifier:
    build:
      context: .
      dockerfile: Dockerfile
    image: qta-phase2:latest
    container_name: qta-telegram-notifier
    entrypoint:
      - "python"
      - "/app/scripts/telegram_alert.py"
      - "--watch=/data/logs"
    env_file:
      - ./.env
    environment:
      TZ: Asia/Seoul
    volumes:
      - ./logs/shadow:/data/logs:ro
    restart: unless-stopped
    depends_on:
      - live-daemon
    deploy:
      resources:
        limits:
          memory: 128M

  # #126 양방향 봇 (PR #205 머지) 의 운영 wiring (#216 후속).
  # telegram_control.py 는 long-poll getUpdates 로 `/kill /release /status /policy /help`
  # 명령을 처리하고 live-daemon 의 dashboard REST API 를 호출. dashboard 가 127.0.0.1:8000
  # 만 listen 하므로 network_mode 로 live-daemon 네트워크 namespace 를 공유 → 호스트 노출
  # 없이 localhost:8000 도달 가능.
  telegram-control:
    build:
      context: .
      dockerfile: Dockerfile
    image: qta-phase2:latest
    container_name: qta-telegram-control
    entrypoint:
      - "python"
      - "/app/scripts/telegram_control.py"
      - "--dashboard=http://localhost:8000"
      - "--audit-wal=/data/logs/telegram_control.wal.jsonl"
    env_file:
      - ./.env
    environment:
      TZ: Asia/Seoul
    volumes:
      - ./logs/shadow:/data/logs   # audit WAL 쓰기 권한 (RW)
    network_mode: "service:live-daemon"
    restart: unless-stopped
    depends_on:
      - live-daemon
    deploy:
      resources:
        limits:
          memory: 128M

  # #152: KIS 1분봉 매일 1회 fetch + 주간 누적 summary.
  # cron_loop.sh 패턴 차용 (bash sleep loop). 평일 KST FETCH_HOUR_KST 에 cron_fetch_kis_daily.py
  # 실행 + 매 결과 Telegram, WEEKLY_DOW 요일에 kis_lake_monitor.py 로 누적 진척도 Telegram 발송.
  # 90거래일 누적 시 #153 (KIS 가설 본판정) 트리거 가능.
  kis-1m-fetch-cron:
    build:
      context: .
      dockerfile: Dockerfile
    image: qta-phase2:latest
    container_name: qta-kis-1m-fetch-cron
    entrypoint: ["/bin/bash", "/app/scripts/kis_1m_fetch_loop.sh"]
    env_file:
      - ./.env
    environment:
      TZ: Asia/Seoul
      LAKE_DIR: /data/lake
      LOG_DIR: /data/logs
      FETCH_HOUR_KST: "16"   # KRX 마감 30분 후
      N_POOL: "30"
      INTERVAL: "1m"
      WEEKLY_DOW: "0"        # 0=Sunday weekly summary
      TARGET_DAYS: "90"
    volumes:
      - ./lake:/data/lake
      - ./logs/kis-fetch:/data/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # #218 후속: Universe-scan paper rebalance cron.
  # 평일 KRX 금요일 15:32 KST → cs-tsmom-kr-daily / cs-rsi-div-kr / cs-adx-ma-kr 발주
  # 일요일 00:00 UTC → cs-tsmom-crypto-daily / cs-rsi-div-crypto / cs-macd-vol-crypto 발주
  # cron_paper_universe_rebal.py 가 universe quote fetch + weights 계산 + paper broker
  # 발주 + Telegram digest 까지 1회 실행. WAL 은 logs/shadow/cron-{sid}/wal.jsonl 에 분리.
  universe-rebal-cron:
    build:
      context: .
      dockerfile: Dockerfile
    image: qta-phase2:latest
    container_name: qta-universe-rebal-cron
    # 2026-06-19: 페이퍼 리밸 digest 가 텔레그램 노이즈("0 제출/N 거부")만 발생시켜
    # 기본 기동에서 제외. 다시 켜려면 `docker compose --profile universe-rebal up -d`.
    profiles: ["universe-rebal"]
    entrypoint: ["/bin/bash", "/app/scripts/universe_rebal_loop.sh"]
    env_file:
      - ./.env
    environment:
      TZ: Asia/Seoul
      KRX_REBAL_HOUR_KST: "15"
      KRX_REBAL_MIN_KST: "32"
      CRYPTO_REBAL_HOUR_UTC: "0"
      CRYPTO_REBAL_DOW_UTC: "0"
      KRX_STRATEGIES: "cs-tsmom-kr-daily cs-rsi-div-kr cs-adx-ma-kr"
      CRYPTO_STRATEGIES: "cs-tsmom-crypto-daily cs-rsi-div-crypto cs-macd-vol-crypto"
      LAST_RUN_FILE: /data/logs/universe-rebal-last-run.txt
      UNIVERSE_SCAN_LIVE_ENABLED: "1"
      # #231 S6 — Python unbuffered stdout 으로 universe_rebal_loop.sh 의 echo
      # 가 docker logs / tee 파일에 즉시 flush. 기존 stdout 손실 (#231 진단) fix.
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./logs/shadow:/app/logs/shadow
      - ./logs/universe-rebal:/data/logs
      - ./data/cache:/app/data/cache
    restart: unless-stopped
    # #231 S6 — docker logs lifetime 보존 (기존 0 lines 진단 후속).
    # max-size 10m × max-file 3 = 30m 보존 후 rotation.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 384M

  # #256 / #259 — airborne v1.1 USDT-perp 실시간 알림 데몬.
  # Binance public WS (101 streams) + 1h universe scan + Telegram alert.
  # 단독 process (PID 1 = python). 죽으면 unless-stopped 으로 즉시 재시작.
  # 2026-05-22 추가 — 사용자 host 에서 직접 띄워두던 게 어제 18:00 silent
  # exit (절전 모드 아님, 원인 미상) → 컨테이너화로 안정 가동 + Docker
  # restart 정책으로 crash 자동 복구.
  #
  # 가동:
  #   docker compose -f docker-compose.live.yml build airborne-daemon
  #   docker compose -f docker-compose.live.yml up -d airborne-daemon
  #   docker compose -f docker-compose.live.yml logs -f airborne-daemon
  airborne-daemon:
    build:
      context: .
      dockerfile: Dockerfile
    image: qta-phase2:latest
    container_name: qta-airborne-daemon
    entrypoint:
      - "python"
      - "/app/scripts/airborne_alert_daemon.py"
      # 2026-05-22: --mode polling — Binance mainnet WebSocket 이 한국 IP 에
      # 메시지 0건 push (region-block, handshake 만 되고 데이터 0). REST
      # (/fapi/v1/klines) 는 차단 없음 → 매 1h boundary +30s 에 REST poll.
      # WS streams 수 무관 (1개로도 stuck 검증됨).
      - "--mode"
      - "polling"
      # 2026-05-23: top-50 → 100. polling 모드는 WS streams 제약 없음.
      # 2026-06-22: 100 → 200. 알림 온 TP 승자가 trader 에서 not_in_universe 로
      # 거부되던 누수 차단(4주 차단 바스켓 net +19.1%). trader get_universe 와
      # 동일 크기. REST 200종목 × 2 interval = 400 콜/시간으로 rate limit 아래.
      - "--top-n"
      - "200"
      # 2026-07-01: --dry-run — 텔레그램 알림만 끄고 fire 감지·"FIRE" 로그(대시보드
      # airborne_fire_refresher 가 docker logs 로 집계)는 유지. airborne 실거래는
      # swing 으로 대체돼 1h 알림 스팸 불필요하나, 대시보드 fire 집계는 계속 필요.
      # dispatch_fire: dry_run 이면 print("[DRY]") + notify skip, log.info("FIRE") 는 항상.
      - "--dry-run"
    env_file:
      - ./.env
    environment:
      TZ: Asia/Seoul
      PYTHONUNBUFFERED: "1"
      # 거래량 top-N in/out 으로 시그널 누락되던 관심 종목 강제 포함
      # (2026-05-22 SKYAI 11:00 시그널 누락 사고). 쉼표 구분.
      # 주의: Binance USDT-M 선물에 실재하는 심볼만 — EURUSDT 는 선물에
      # 없어 400 Bad Request → crash loop 유발해 제거 (2026-05-22).
      AIRBORNE_ALWAYS_INCLUDE: "SKYAIUSDT,TRXUSDT"
    volumes:
      - ./logs/airborne:/data/logs
    restart: unless-stopped
    # healthcheck 미설정 — python:slim 에 pgrep(procps) 미설치라 기존
    # pgrep 기반 체크가 항상 'not found' → 거짓 unhealthy. process crash 는
    # restart: unless-stopped 가 커버. stuck 감지(heartbeat-file 기반)는
    # 후속 PR 에서 데몬 코드에 heartbeat 추가 후 재도입.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  # #329 follow-up — airborne TRADER (daemon FIRE 라인 listen → 자체 broker 발주).
  # qta-airborne-daemon 의 stdout FIRE 를 docker logs 로 polling 해서 자체
  # Binance Futures account 에 발주. orchestrator (cs-tsmom + live-airborne-
  # bb-reversal-kst-hours) 와 *별도* entity — capital 경합은 spec 의 권장 비중
  # 으로 통제 (cs-tsmom 50% / live-airborne-kst-hours 25% / 본 trader 25%).
  #
  # 2026-05-28: venue=testnet 기본 → Binance Futures Testnet 으로 실 발주 (가짜 돈).
  # .env 의 BINANCE_DEMO_API_KEY + BINANCE_DEMO__SECRET_API_KEY 자동 인식.
  # mainnet 전환 시:
  #   1. AIRBORNE_TRADER_VENUE=mainnet
  #   2. .env 의 BINANCE_API_KEY + BINANCE_SECRET_KEY 자동 인식
  #   3. docs/runbooks/airborne-trader-activation.md 체크리스트 통과
  #
  # 가동:
  #   docker compose -f docker-compose.live.yml build airborne-trader
  #   docker compose -f docker-compose.live.yml up -d airborne-trader
  #   docker compose -f docker-compose.live.yml logs -f airborne-trader
  airborne-trader:
    build:
      context: .
      dockerfile: Dockerfile
    image: qta-phase2:latest
    container_name: qta-airborne-trader
    depends_on:
      - airborne-daemon
    entrypoint:
      - "python"
      - "/app/scripts/airborne_trader_daemon.py"
    env_file:
      - ./.env
    environment:
      TZ: Asia/Seoul
      PYTHONUNBUFFERED: "1"
      # daemon container 이름 — listener 가 docker logs 호출 시 사용.
      AIRBORNE_TRADER_DAEMON: "qta-airborne-daemon"
      # 2026-05-28: venue=testnet (Binance Futures Testnet 가짜 돈), 실 발주.
      # mainnet 전환: 이 값을 "mainnet" 으로.
      AIRBORNE_TRADER_VENUE: "testnet"
      # 명시 false — 실제 주문 송신 (venue=testnet 이라 가짜 돈).
      # 로그만 보고 싶으면 "true" 로 바꿈.
      AIRBORNE_TRADER_DRY_RUN: "false"
      # SQLite WAL 경로 — bind mount 와 일치.
      AIRBORNE_TRADER_STATE_PATH: "/data/state.db"
      # 종목당 USDT 노출. 4000$ seed 기준 5% = 200.
      AIRBORNE_TRADER_POSITION_USD: "200"
      # 동시 보유 한도. 10 × 200 = max 2000$ 시장 노출.
      AIRBORNE_TRADER_MAX_POSITIONS: "10"
      # 일일 손실 한도 (KST 자정 기준). 도달 시 kill switch 자동 trigger →
      # CLI --unlock-daily-kill 까지 차단.
      AIRBORNE_TRADER_DAILY_LOSS_USD: "-200"
    # daemon container 의 docker.sock 접근 필요 — listener 가 docker logs 호출.
    # alternative: daemon log 를 파일로 share (bind mount). 본 PR 은 docker.sock
    # 방식 — 가장 단순. host-only 환경 (사용자 PC) 이라 보안 영향 X.
    volumes:
      - ./logs/airborne_trader:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    # healthcheck 미설정 — daemon 패턴 동일 (restart: unless-stopped 가 crash 커버).
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  # 2026-06-16 — 이동평균 골든/데드 크로스 알림 데몬 (비트겟 top-100, 1시간봉).
  # airborne-daemon 과 동일 패턴: 단독 process (PID 1 = python), Bitget REST
  # polling (한국 IP safe — Binance WS 같은 region-block 없음), Telegram alert.
  # 매 1h boundary +30s 에 top-100 1h 캔들 250개 REST fetch → SMA25×SMA200
  # 크로스 평가 → 발생 시 LIVE 텔레그램 채널 (airborne 알림과 동일 채널) 발송.
  # 자동매매 아님 — 시각적 가이드 알림 (주문/리스크 결정 없음, 불변식 #6).
  #
  # 가동:
  #   docker compose -f docker-compose.live.yml build ma-cross-daemon
  #   docker compose -f docker-compose.live.yml up -d ma-cross-daemon
  #   docker compose -f docker-compose.live.yml logs -f ma-cross-daemon
  ma-cross-daemon:
    build:
      context: .
      dockerfile: Dockerfile
    image: qta-phase2:latest
    container_name: qta-ma-cross-daemon
    entrypoint:
      - "python"
      - "/app/scripts/ma_cross_alert_daemon.py"
      - "--top-n"
      - "100"
      - "--fast"
      - "25"
      - "--slow"
      - "200"
    env_file:
      - ./.env
    environment:
      TZ: Asia/Seoul
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./logs/ma-cross:/data/logs
    restart: unless-stopped
    # healthcheck 미설정 — airborne-daemon 과 동일 (python:slim 에 pgrep 미설치).
    # process crash 는 restart: unless-stopped 가 커버.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  # 2026-06-19 — PPP 반전 스캘핑 페이퍼 시그널 데몬 (live-ppp-scalping-v1).
  # 고변동 알트 5m 과매수/과매도 + QPP 크로스 + 횡보레짐 반전 시그널을
  # logs/ppp/history.jsonl 에 누적 → 대시보드 /ppp 페이지. ma-cross-daemon 미러.
  # ⚠️ 라이브 자동매매 미활성(5y OOS 과적합) — 페이퍼 OOS 데이터 수집 전용.
  #   docker compose -f docker-compose.live.yml up -d ppp-signal-daemon
  ppp-signal-daemon:
    build:
      context: .
      dockerfile: Dockerfile
    image: qta-phase2:latest
    container_name: qta-ppp-signal-daemon
    entrypoint:
      - "python"
      - "/app/scripts/ppp_signal_daemon.py"
    env_file:
      - ./.env
    environment:
      TZ: Asia/Seoul
      PYTHONUNBUFFERED: "1"
      PPP_SYMBOLS: "WLDUSDT,ORDIUSDT,WIFUSDT,1000PEPEUSDT"
    volumes:
      - ./logs/ppp:/app/logs/ppp
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

# Named volumes 미사용 - bind mount 로 호스트 ./data/ 직접 inspect 가능 (운영 일지 작성 시).
