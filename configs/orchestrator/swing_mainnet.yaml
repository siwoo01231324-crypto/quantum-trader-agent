# Swing-only MAINNET roster (2026-06-30) — 실전 검증용 (작은 사이즈 + 1x).
#
# ⚠️⚠️ 실거래(real money). bitget-mainnet 으로 돌릴 때만 사용. ⚠️⚠️
#
# swing.yaml 과 동일 격리 원칙(스윙 4h 2전략만 → 4h collision 0) + 검증용 안전세팅:
#   - default_size 0.05 (자본의 5%/포지션). 2026-06-30: 1%($1.86)는 bitget 최소
#     주문금액 $5 미달로 below_min_notional 드롭 → 무한 재신호+알림스팸. 5%($9.3)로 상향.
#   - 레버리지 1x 는 런처가 QTA_TARGET_LEVERAGE=1 로 강제 (거래소 종목 레버리지)
#
# ⚠️ airborne 과 절대 동시 가동 금지:
#   (1) 4h collision  (2) 종목 레버리지 충돌(airborne 10x vs 스윙 1x, bitget 종목당 1개)
#   (3) fill 스트림 혼선. → airborne 끄고 이 config 로 스윙 단독 기동.
#
# 실행: scripts/run_swing_mainnet.ps1 (airborne 정지 후). 첫 거래 TP/SL 로그
#   `protective_coordinator: registered ... SL=Y TP=Z` 를 눈으로 확인할 것.

orchestrator:
  min_order_interval_sec: 300
  # 선점 우선 cross-strategy 종목중복 차단 (2026-07-01) — swing 롱·숏 동시운용
  # (투매반등/터틀 롱 + macross 데드숏) 시 같은 종목 롱+숏 동시진입 = Bitget
  # one-way 네팅 사고(2y 실측 48건). 먼저 잡은 전략이 점유 → 다른 전략 skip.
  # 현재 롱2 전략만이라 same-side 충돌은 드물지만, macross(숏) 활성화 대비 미리 ON.
  cross_strategy_symbol_lock: true
  # 전체 *증거금* 노출 상한 (2026-07-01) — 열린 포지션 default_size 합 ÷ 레버리지
  # = 사용 증거금%. 이 값 도달 시 신규진입만 차단(기존 포지션 강제청산·evict 안 함,
  # TP/SL 자연청산으로 슬롯 빔). **증거금 기준이라 레버 1x↔10x 바뀌어도 캡 고정** —
  # QTA_TARGET_LEVERAGE 만 바꾸면 포지션 수용량 자동 조정(레버는 config_loader 가
  # executor 와 동일 env 로 읽음). 잔여 5% 버퍼(에어본 잔여<$5 사고 방지).
  #   1x 테스트: default_size 0.05 → 증거금 5%/포지션, 캡 0.95 = ~19포지션.
  #   10x 운영:  default_size 0.05 → 증거금 0.5%/포지션 → 더 많이(단 수익 위해선
  #              10x 전환 시 default_size 도 키우기 = 예 0.50 → 증거금 5%/포지션).
  max_total_margin_pct: 0.95

strategies:
  # 투매반등 — SL=꼬리저점, TP=2R (진입시 확정 동적값 → 거래소 라인). 채널청산 없음.
  - id: live-capitulation-bounce
    class: backtest.strategies.live_capitulation_bounce.LiveCapitulationBounce
    kwargs:
      default_size: 0.05          # 1x테스트 명목5%=증거금5% (~$12, bitget 최소충족). 10x전환시 0.50 권장
      n_dev: 2.5
      wick_mult: 1.5
      vol_mult: 2.0
      rr: 2.0
      stop_loss_pct: 0.05         # override 미전달 시 fallback
      take_profit_pct: 0.10
      anomaly_guard_enabled: true

  # 돌파 — SL=2ATR(거래소 backstop), 주청산=채널(봇 감시, SWING_CHANNEL_SWEEP).
  - id: live-donchian-breakout-btcgate
    class: backtest.strategies.live_donchian_breakout_btcgate.LiveDonchianBreakoutBtcGate
    kwargs:
      default_size: 0.05          # 1x테스트 명목5% (터틀도 통일). 10x전환시 0.20~0.30 권장(폭주 대비 소액)
      breakout_lookback: 20
      exit_lookback: 10
      stop_atr_mult: 2.0
      btc_regime_gate: true
      stop_loss_pct: 0.08
      take_profit_pct: 0.50
      anomaly_guard_enabled: true

  # ── live-macross-regime-v1 데드크로스 숏 (2026-07-01, candidate 비활성) ───────
  # 롱2(투매반등·터틀돌파, BTC상승레짐) 옆에 숏1 추가 → 레짐 헤지(하락장 커버).
  # 검증: SMA25/200 데드크로스 숏 + R(BTC레짐)+ADX≥20+자기SMA200하회+과확장회피(10%)
  #       + 자체도출 시간게이트 {2,3,4,5,6,7,12,13,14,19,22}(에어본차용 폐기).
  #   5y PF 1.61 / 2y PF 1.42, split-half OOS 전반1.43·후반1.81 통과. RR1:6.
  #   롱(골든)은 5y −144% 구조적 손실이라 allow_long=False 로 숏 전용.
  # 활성화됨 (2026-07-01) — 선결①(cross_strategy_symbol_lock)·②(max_total_notional_pct)
  # 완료. ③ 생존편향·라이브 슬리피지는 소액 라이브 관찰로 검증(지금부터).
  - id: live-macross-regime-v1
    class: backtest.strategies.live_macross_regime_v1.LiveMacrossRegime
    kwargs:
      default_size: 0.05          # 1x테스트 (투매반등과 통일). 10x전환시 0.50
      allow_long: false           # 숏 전용 (롱 5y 손실)
      allow_short: true
      kst_hour_gate: true         # 자체도출 시각 (기본값=검증된 11시각)
      self_sma200_filter: true    # 종목 자기 SMA200 하회 정렬
      overextension_max_pct: 0.10 # 과확장 추격 금지
      stop_loss_pct: 0.02         # -2% (RR1:6)
      take_profit_pct: 0.12       # +12%
      max_concurrent_positions: 8 # 동시보유 상한 (신호 과다 대비)

capital_allocation:
  universe_scan_pct: 0.0
  live_scanner_pct: 1.0
