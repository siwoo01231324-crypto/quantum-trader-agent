# Production strategy roster (#177).
#
# This file is bundled into qta.exe via qta.spec datas=[("configs", "configs")].
# Loaded by src.live.loop._load_orchestrator → src.portfolio.config_loader.load_orchestrator_from_yaml.
#
# Override path: qta.exe --production-yaml /path/to/custom.yaml
#
# Risk thresholds: NOT in this file. policy.yaml (risk DSL) is loaded separately
# via ShadowConfig.policy. See docs/specs/risk-rule-dsl.md and §7-2 of the
# whitepaper for the boilerplate Phase 1-2 policy.
#
# #238 Item 3b — orchestrator-level duplicate-order backstop. Item 1 throttles
# momo at the strategy layer (900s); this is the defense-in-depth net for ANY
# non-live-scanner strategy (momo-kis-v1, future single-ticker) flooding an
# identical (sid, symbol, side) every WS tick. 60s: kills a tick-flood while
# never suppressing legitimate ≥15m signals. live-scanner is excluded (its
# own _live_entered lifecycle governs re-entry). Absent → 0.0 = disabled.
orchestrator:
  min_order_interval_sec: 60

# 5 baseline strategies + 메타라벨러 (#85) opt-in entry (commented).
strategies:
  # ── Crypto sleeve (Binance USDT-M Futures, 15m bars) ─────────────────────
  # momo-btc-v2 — DISABLED (2026-05-20). sizing_mode:"full" 가 실 보유와 무관하게
  # 전 자본분 매도(예: 0.072 BTC) 를 시도 → reduceOnly 가 막아 naked-short 는 방지
  # 되지만 매 신호마다 Binance -2022 거부 로그 도배 + 다전략 BTC 공유 포지션을
  # 임의 청산해 다른 전략 장부 깨뜨림 (one-way 모드). 실거래로 활성화 안 함.
  # - id: momo-btc-v2
  #   class: backtest.strategies.momo_btc_v2.MomoBtcV2
  #   kwargs:
  #     symbol: BTCUSDT      # cross-asset gate (#177); strategy holds on non-BTC bars
  #     sizing_mode: full
  #     # #238 — Binance aggTrade WS drives on_bar at dozens/sec. momo is a 15m
  #     # strategy; without this it re-emits an identical SELL every tick while
  #     # bearish divergence persists → -2019 Margin-insufficient order flood.
  #     # 900s = at most one signal per intended 15m bar. Default (0.0) is OFF
  #     # so backtests/Sharpe gate stay bit-identical; live opts in here.
  #     min_signal_interval_sec: 900
  #     # #238 — momo is single-ticker (NOT a LiveScannerMixin) so it had NO
  #     # auto stop/TP. Root incident: a naked -1 BTC short that ran with ZERO
  #     # stop because LivePositionRiskManager was long-only AND momo declared
  #     # no thresholds. scripts/live_run._register_exit_policies reads these
  #     # and builds a StopTpPolicy (handles long AND short). on_bar/backtest
  #     # never read them → 5y Sharpe gate stays bit-identical.
  #     stop_loss_pct: 0.03
  #     take_profit_pct: 0.06

  # ── Crypto sleeve (Binance USDT-M Futures, 4h bars, vol-filtered) ────────
  - id: momo-vol-filtered
    class: backtest.strategies.momo_vol_filtered.MomoVolFiltered
    kwargs: {}

  # ── Crypto sleeve (ETH/BTC, 1h bars, mean-reversion z-score) ─────────────
  - id: meanrev-pairs
    class: backtest.strategies.meanrev_pairs.MeanrevPairs
    kwargs: {}

  # ── KRX sleeve (KOSPI200 basket, EOD donchian breakout) ──────────────────
  - id: breakout-donchian
    class: backtest.strategies.breakout_donchian.BreakoutDonchian
    kwargs: {}

  # ── KRX sleeve (single stock 005930, 15m RSI divergence) ─────────────────
  - id: momo-kis-v1
    class: backtest.strategies.momo_kis_v1.MomoKisV1
    kwargs:
      symbol: "005930"
      sizing_mode: half-kelly

  # ── Universe-Scan strategies (#218) — broker 동적 universe 통합 후 활성화 ─
  #
  # 본 entries 는 config_loader 가 import + register 하지만, market_snapshot
  # ["ohlcv_history"] 에 universe 종목 OHLCV 가 없으면 cs_async_wrapper 가 graceful
  # warmup 또는 no_data 로 hold 반환 — broker 미연동 상태에서 zero impact.
  #
  # broker 통합 후 (universe-scan-broker-contract.md 참조) 실제 작동 — KIS 측은
  # fetch_universe_snapshot, Binance 측은 fetch_universe_klines 메서드 추가 필요.

  - id: cs-tsmom-kr-daily
    class: backtest.strategies.cs_async_wrapper.CrossSectionalAsyncStrategy
    kwargs:
      strategy_id: cs_tsmom_kr_daily
      module: backtest.strategies.cs_tsmom_kr_daily
      symbol: KRX_TOP350_BASKET
      rebal_freq: 5
      warmup_bars: 252
      weights_kind: krx
      params:
        top_n: 20
        min_turnover: 1000000000
        min_price: 1000

  - id: cs-rsi-div-kr
    class: backtest.strategies.cs_async_wrapper.CrossSectionalAsyncStrategy
    kwargs:
      strategy_id: cs_rsi_div_kr
      module: backtest.strategies.cs_rsi_div_kr
      symbol: KRX_TOP350_BASKET
      rebal_freq: 5
      warmup_bars: 40
      weights_kind: krx
      params:
        top_n: 20
        min_turnover: 1000000000
        min_price: 1000

  - id: cs-adx-ma-kr
    class: backtest.strategies.cs_async_wrapper.CrossSectionalAsyncStrategy
    kwargs:
      strategy_id: cs_adx_ma_kr
      module: backtest.strategies.cs_adx_ma_kr
      symbol: KRX_TOP350_BASKET
      rebal_freq: 5
      warmup_bars: 40
      weights_kind: krx_hlc
      params:
        top_n: 20
        min_turnover: 1000000000
        min_price: 1000

  - id: cs-tsmom-crypto-daily
    class: backtest.strategies.cs_async_wrapper.CrossSectionalAsyncStrategy
    kwargs:
      strategy_id: cs_tsmom_crypto_daily
      module: backtest.strategies.cs_tsmom_crypto_daily
      symbol: CRYPTO_TOP30_BASKET
      rebal_freq: 5
      warmup_bars: 252
      weights_kind: crypto
      params:
        top_n: 10
        min_quote_vol: 10000000

  - id: cs-rsi-div-crypto
    class: backtest.strategies.cs_async_wrapper.CrossSectionalAsyncStrategy
    kwargs:
      strategy_id: cs_rsi_div_crypto
      module: backtest.strategies.cs_rsi_div_crypto
      symbol: CRYPTO_TOP30_BASKET
      rebal_freq: 5
      warmup_bars: 40
      weights_kind: crypto
      params:
        top_n: 10
        min_quote_vol: 10000000

  - id: cs-macd-vol-crypto
    class: backtest.strategies.cs_async_wrapper.CrossSectionalAsyncStrategy
    kwargs:
      strategy_id: cs_macd_vol_crypto
      module: backtest.strategies.cs_macd_vol_crypto
      symbol: CRYPTO_TOP30_BASKET
      rebal_freq: 5
      warmup_bars: 40
      weights_kind: crypto
      params:
        top_n: 10
        min_quote_vol: 10000000
        vol_ceiling: 2.0

  # cs-bb-macd-kr 는 5y bench Sharpe -0.32 → status: inactive, production 미등록.
  # 코드는 src/backtest/strategies/cs_bb_macd_kr.py 유지 — score 정의 재설계 후 활성화 검토.

  # ── Smoke 전략 (operator-only — 대시보드 거래 통로 검증) ───────────────────
  #
  # SMOKE_TEST_ENABLED=1 env 가 설정돼 있어야 신호 emit. 그 외에는 hold 반환 →
  # 등록만 되고 거래 zero. 대시보드 "거래 시작" 후 매 1분 round-trip 발생을
  # 운영 진단 카드 + 거래 이력 카드에서 즉시 확인 가능.
  #
  # **운영 사용 금지** — 알파 0, 매 분 거래 비용만 누적.
  # 검증 완료 후 SMOKE_TEST_ENABLED env 제거 또는 두 entry 재주석.
  - id: smoke-1m-roundtrip-kis
    class: backtest.strategies.smoke_1m_roundtrip.Smoke1mRoundtrip
    kwargs:
      symbol: "005930"
      # #238 — KIS 통로 검증용. size_to_qty(#238-8) 도입 후 size_fraction 은
      # "자본 대비 %". 0.01×~973만원÷7만원 ≈ 1.39 → 1주(edge, 주가↑/잔고↓ 시
      # 0주 drop 위험). 0.02 → 2주 마진 확보 (코인 smoke 와 동일한 통로
      # 검증 신뢰도). SMOKE_TEST_ENABLED=1 일 때만 발사.
      size_fraction: 0.02
  - id: smoke-1m-roundtrip-binance
    class: backtest.strategies.smoke_1m_roundtrip.Smoke1mRoundtrip
    kwargs:
      symbol: BTCUSDT
      size_fraction: 0.01

  # ── Live Universe Scanner strategies (#227) ──────────────────────────────
  #
  # **DEFAULT: ALL DISABLED.** 활성화는 다음 두 조건 모두 충족해야 한다:
  #   1. 환경 변수 LIVE_SCANNER_ENABLED=1 (live_run.py 가 LivePositionRiskManager 와이어업)
  #   2. 아래 entry 의 주석 해제 (config_loader 가 register_strategy 호출)
  #
  # 두 조건 모두 충족되면 orchestrator 가 LiveScannerMixin 전략을 universe 의 각
  # 종목마다 dispatch + LivePositionRiskManager 가 stop_loss/take_profit/trailing
  # 자동 청산. 활성화 전에는 universe-scan / single-ticker 전략만 동작 (zero impact).
  #
  # **5y backtest 미실시** — Sharpe ≥ 0.5 통과 검증 후 1건씩 활성화 권장 (#229 후속).
  #
  # #238 uncomment — LIVE_SCANNER_ENABLED=1 env gate 가 여전히 zero-impact 보장.
  # env 없으면 config_loader 는 register 하지만 LivePositionRiskManager 미구성 →
  # universe-scan / single-ticker 만 동작. env=1 일 때만 universe 매 tick 스캔 +
  # 자동 stop/TP 청산. 5y bench 미검증 — testnet 동작 검증 우선 (#238 A 옵션).
  # live-scanner 5종 — ALL DISABLED (2026-05-20). 5y 1m × 30심볼 × 비용 10bp
  # 검증 결과 전부 PF<1 · 거래당 기대값 음수 (LOSER):
  #   live_bb_lower_bounce             PF 0.922  exp -0.179%
  #   live_rsi_oversold_volume_spike   PF 0.919  exp -0.185%
  #   live_oversold_with_divergence    PF 0.911  exp -0.203%
  #   live_macd_bullish_cross_breakout PF 0.885  exp -0.264%
  #   live_breakout_with_atr_stop      PF 0.868  exp -0.243%
  # 벤치 Sharpe(1.5~3.7) 가 게이트 통과시키던 것은 일별평균+(252/n_days) 투영
  # 집계 착시였음 (reports/eval_live_scanners_5y.json). 견고지표(PF·기대값)
  # 으로 보면 전부 거래 많을수록 잔고가 깎이는 음의 엣지 전략. 파라미터
  # 튜닝(stop/TP/trailing %)으로 못 고침 — breakout-atr sweep 이 이미 증명.
  # 재활성화는 (a) 진입 신호 재설계 + (b) PF>1·exp>0 게이트 통과 후에만.
  # - id: live-rsi-oversold-volume-spike
  #   class: backtest.strategies.live_rsi_oversold_volume_spike.LiveRsiOversoldVolumeSpike
  #   kwargs: {}
  # - id: live-macd-bullish-cross-breakout
  #   class: backtest.strategies.live_macd_bullish_cross_breakout.LiveMacdBullishCrossBreakout
  #   kwargs: {}
  # - id: live-bb-lower-bounce
  #   class: backtest.strategies.live_bb_lower_bounce.LiveBbLowerBounce
  #   kwargs: {}
  # - id: live-breakout-with-atr-stop
  #   class: backtest.strategies.live_breakout_with_atr_stop.LiveBreakoutWithAtrStop
  #   kwargs: {}
  # - id: live-oversold-with-divergence
  #   class: backtest.strategies.live_oversold_with_divergence.LiveOversoldWithDivergence
  #   kwargs: {}
  #
  # ─── Candidate-C 4-parallel deployment (added 2026-05-20) ─────────────────
  #
  # 위 5종이 코인 1m 에서 PF<1 LOSE 였지만, 같은 4종(macd 제외)을 코인 **1d** 로
  # 재검정 시 PBO=0.0007 PASS + walk-forward 평균 79% 일관성 + 합성 시뮬에서
  # ensemble 단독으로 SR 3.14 / MDD -23.2% / CAGR +135% (cs_tsmom_crypto 와의
  # 상관 0.43, portfolio-level sim 결과는 reports/portfolio_cs_plus_cand_c.json).
  # 자세한 검증: docs/background/51-live-scanner-bn1d-ensemble-validation.md.
  #
  # 1-instance wrapper 시도(live_scanner_ensemble_bn1d)는 OR-게이트 1-position
  # 디자인이 분산 효과 파괴 → 5y wrapper bench PF 0.95 LOSER 로 rejected
  # (docs/specs/strategies/live-scanner-ensemble-bn1d.md). 진짜 Candidate C
  # 효과는 4 sub 를 **parallel entry** 로 등록하는 방식만 가능.
  #
  # 4 entry id 에 `cand-c-2026-05-20-` prefix 부여 (사용자 식별자) + class 는
  # 위 5종 commented entry 와 동일 (코드 재사용, 동일 LiveScannerMixin 이라 같은
  # stop=3%/tp=6% LivePositionRiskManager 청산). default_size 가 Candidate-C
  # weight × half_kelly 비율 = 0.05 baseline 의:
  #   rsi_oversold_volume_spike : 0.05 × 0.30 × 0.5 = 0.0075
  #   breakout_with_atr_stop    : 0.05 × 0.30 × 0.5 = 0.0075
  #   bb_lower_bounce           : 0.05 × 0.20 × 0.5 = 0.0050
  #   oversold_with_divergence  : 0.05 × 0.20 × 0.5 = 0.0050
  #
  # **2중 활성화 게이트** (uncomment 후 둘 다 ON):
  #   1. 아래 4 entry 의 # 제거
  #   2. ENV `LIVE_SCANNER_BN1D_ENSEMBLE_ENABLED=1`
  #      (LIVE_SCANNER_ENABLED=1 도 함께 필요 — LivePositionRiskManager 와이어)
  #
  # **활성화 전 체크리스트** (사용자 결정):
  #   (a) cs_tsmom_crypto_daily 와 병행 운영 (자본 분배: cs_tsmom 70~50% + 본 4종 30~50%)
  #   (b) paper 6개월 무사고 — PnL 양수 / MDD ≤ -25%
  #   (c) 자동 trip 게이트 (3개월 rolling PF<1 → ENV gate OFF + 알람)
  #   (d) 펀딩비·슬리피지 현실 페널티 (보수적 SR -30% / MDD +50% 추정)
  #
  # - id: cand-c-2026-05-20-live-rsi-oversold-volume-spike
  #   class: backtest.strategies.live_rsi_oversold_volume_spike.LiveRsiOversoldVolumeSpike
  #   kwargs:
  #     default_size: 0.0075  # 0.05 × weight 0.30 × half_kelly 0.5
  # - id: cand-c-2026-05-20-live-breakout-with-atr-stop
  #   class: backtest.strategies.live_breakout_with_atr_stop.LiveBreakoutWithAtrStop
  #   kwargs:
  #     default_size: 0.0075  # 0.05 × weight 0.30 × half_kelly 0.5
  # - id: cand-c-2026-05-20-live-bb-lower-bounce
  #   class: backtest.strategies.live_bb_lower_bounce.LiveBbLowerBounce
  #   kwargs:
  #     default_size: 0.0050  # 0.05 × weight 0.20 × half_kelly 0.5
  # - id: cand-c-2026-05-20-live-oversold-with-divergence
  #   class: backtest.strategies.live_oversold_with_divergence.LiveOversoldWithDivergence
  #   kwargs:
  #     default_size: 0.0050  # 0.05 × weight 0.20 × half_kelly 0.5
  #
  # HTS 검색식 hybrid (#230) — 단타·5분대기·스윙 OR 합성. KST ≤ 10:30 시간대 게이트.
  # KIS 1m 30일 한계로 5y bench 데이터 부족 → paper-only 운영 (5거래일 누적 후 검증).
  # - id: live-hts-hybrid
  #   class: backtest.strategies.live_hts_hybrid.LiveHtsHybrid
  #   kwargs:
  #     default_size: 0.05
  #     max_entry_hour: 10.5

  # ── 메타라벨러 활성화 (#85) — 운영자 절차 ─────────────────────────────────
  # 1. python scripts/train_metalabeler_btc.py --output-dir models/momo-btc-v2
  # 2. python scripts/promote_metalabeler.py --strategy momo-btc-v2 --version <ts>
  # 3. 아래 블록 uncomment 후 EXE 재시작
  #
  # config_loader 는 모델 아티팩트 부재 시 본 entry 만 skip + warning (#177
  # graceful skip). 다른 5전략은 정상 등록.
  #
  # - id: momo-btc-v2-meta
  #   class: backtest.strategies.momo_btc_v2.MomoBtcV2
  #   kwargs:
  #     sizing_mode: full
  #     metalabeler:
  #       load_path: models/momo-btc-v2/latest/
