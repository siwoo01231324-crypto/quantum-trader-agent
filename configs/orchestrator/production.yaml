  # ── live-airborne-bb-reversal-kst-hours (2026-05-27, #327) ──────────────────
  # 사용자 요청: 자동매매로 추가, 잔고 50% 내 노출, 종목당 ~200$ (= 4000$ seed 의 5%).
  # 5y bench PF 1.081 / Sharpe 0.96 / exp +0.163%/trade. spec:
  # docs/specs/strategies/live-airborne-bb-reversal-kst-hours.md
  #
  # 데몬 무수정 — qta-airborne-daemon (Telegram 알림) 은 24h 그대로 발화.
  # 본 전략은 같은 signal 모듈을 orchestrator 안에서 직접 호출 (daemon log
  # 의존 X). docker-compose / scripts/airborne_alert_daemon.py 영향 없음.
  #
  # capital_fraction 은 CrossSectional wrapper 전용 — live-scanner 는
  # default_size × leverage 로 제어. 24 종목 × 4 시각 fire 분산 + 평균 보유
  # 1~2h 라 일반 동시 보유 3~5 포지션 (= 15~25% equity 노출). 모든 종목 같은
  # 시각 동시 fire 는 5y 내 0 회 관찰 → 50% 한도 자연 충족.
  - id: live-airborne-bb-reversal-kst-hours
    class: backtest.strategies.live_airborne_bb_reversal_kst_hours.LiveAirborneBbReversalKstHours
    kwargs:
      # 2026-06-02 capital-allocation-v1: 0.05 → 0.04 (시드 20% 비중, 동시
      # 5 보유 = 20%). spec: docs/specs/capital-allocation-v1.md
      # 3 전략 합산 80%: cs-tsmom 40% + kst-hours 20% + short-whitelist 20%.
      default_size: 0.04
      stop_loss_pct: 0.03    # -3% price (5y bench 검증값)
      take_profit_pct: 0.06  # +6% price (R/R 1:2)
      # stop 청산 직후 같은 (sid, symbol) 재진입 15분 차단 — churn 방지.
      cooldown_after_stop_sec: 900

  # ── live-airborne-short-whitelist-v1 (2026-06-02, PR #341+#343 후속) ─────────
  # SHORT-only airborne + 21종 동적 whitelist + KST 19시간 게이트.
  # spec: docs/specs/strategies/live-airborne-short-whitelist-v1.md
  # whitelist: config/airborne_short_whitelist.yaml (weekly refresh)
  #
  # Hard OOS 검증 (147종 per-symbol PF + train 2021-2023 / test 2024-2025):
  #   test PF=1.214, sumR=+1,395%, 5.45 trades/day, win 44%
  #   펀딩비 SHORT 수익 +1pp PF 추가
  #
  # kst-hours 와 *별도 엔트리* — 같은 universe 일부 overlap 하지만:
  #   - kst-hours 는 4시간 게이트 + bidir, top-100 universe
  #   - 본 전략은 19시간 게이트 + SHORT only, 21종 whitelist active 만
  # 두 전략은 동시 발화해도 cooldown_after_stop_sec + max position
  # cap 으로 자본 보호. 같은 (sid, symbol, side) 중복은 orchestrator
  # min_order_interval_sec=300 가 backstop.
  #
  # 운영 시작: testnet 4주 paper trading. 통과 시 mainnet 별도 PR.
  - id: live-airborne-short-whitelist-v1
    class: backtest.strategies.live_airborne_short_whitelist_v1.LiveAirborneShortWhitelistV1
    kwargs:
      # 2026-06-02 capital-allocation-v1: 0.05 → 0.04 (시드 20% 비중, 동시 5).
      # spec: docs/specs/capital-allocation-v1.md
      default_size: 0.04         # kst-hours 와 동일 비중
      stop_loss_pct: 0.03        # -3% (Hard OOS 검증값)
      take_profit_pct: 0.06      # +6% (R/R 1:2)
      retrace_ratio: 0.6         # Hard OOS 검증값 (부모 default 0.4)
      atr_body_mult: 0.3         # Hard OOS 검증값 (부모 default 0.6)
      cooldown_after_stop_sec: 900

  # cs-bb-macd-kr 는 5y bench Sharpe -0.32 → status: inactive, production 미등록.
  # 코드는 src/backtest/strategies/cs_bb_macd_kr.py 유지 — score 정의 재설계 후 활성화 검토.

  # ── Smoke 전략 (operator-only — 대시보드 거래 통로 검증) ───────────────────
  #
  # SMOKE_TEST_ENABLED=1 env 가 설정돼 있어야 신호 emit. 그 외에는 hold 반환 →
