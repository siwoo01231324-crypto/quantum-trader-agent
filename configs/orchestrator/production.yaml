      # 2026-05-27 v0.6.7: top_n 10→30 (universe 전체 양수 score 종목 다 매수)
      # + min_picks 3 (양수 종목 < 3 이면 hold). "시드 40% 안에서 N종 자유롭게
      # 비중 분배" 의도. 예: 양수 10종 → 각 4%; 5종 → 각 8%; 3종 → 각 13.3%;
      # 1~2종 → hold (집중 회피 — ZEC 단독 40% 같은 사고 차단).
      # ⚠️ 5y bench (top_n=10 / capital_fraction=0.5 기준) PF 1.32 / Sharpe
