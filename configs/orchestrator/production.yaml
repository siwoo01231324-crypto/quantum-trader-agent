  - id: cs-tsmom-crypto-daily
    class: backtest.strategies.cs_async_wrapper.CrossSectionalAsyncStrategy
    kwargs:
      strategy_id: cs_tsmom_crypto_daily
      module: backtest.strategies.cs_tsmom_crypto_daily
      symbol: CRYPTO_TOP30_BASKET
      rebal_freq: 5
      warmup_bars: 252
      weights_kind: crypto
      # 2026-06-02 capital-allocation-v1: 0.5 → 0.4 (3 전략 동시 운영 safety
      # margin 20% 확보). 3 전략 합산 80%: cs-tsmom 40% + kst-hours 20% +
