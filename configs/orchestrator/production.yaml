# Production strategy roster (#177).
#
# This file is bundled into qta.exe via qta.spec datas=[("configs", "configs")].
# Loaded by src.live.loop._load_orchestrator → src.portfolio.config_loader.load_orchestrator_from_yaml.
#
# Override path: qta.exe --production-yaml /path/to/custom.yaml
#
# Risk thresholds: NOT in this file. policy.yaml (risk DSL) is loaded separately
# via ShadowConfig.policy. See docs/specs/risk-rule-dsl.md and §7-2 of the
# whitepaper for the boilerplate Phase 1-2 policy.
#
# #238 Item 3b — orchestrator-level duplicate-order backstop. Item 1 throttles
# momo at the strategy layer (900s); this is the defense-in-depth net for ANY
# non-live-scanner strategy (momo-kis-v1, future single-ticker) flooding an
# identical (sid, symbol, side) every WS tick. 60s: kills a tick-flood while
# never suppressing legitimate ≥15m signals. live-scanner is excluded (its
# own _live_entered lifecycle governs re-entry). Absent → 0.0 = disabled.
#
# 2026-05-26 v0.6.0 — 60→300s 상향. 5/24-25 저널의 1신호→2.4 fill churn (수수료
# 일 105 USDT) 완화. live-scanner 4종은 여전히 자체 cooldown_after_stop_sec
# (각 900s) 로 churn 차단 — 본 게이트는 single-ticker 만 대상.
orchestrator:
  min_order_interval_sec: 300

# 5 baseline strategies + 메타라벨러 (#85) opt-in entry (commented).
strategies:
  # ── Crypto sleeve (Binance USDT-M Futures, 15m bars) ─────────────────────
  # momo-btc-v2 — DISABLED (2026-05-20). sizing_mode:"full" 가 실 보유와 무관하게
  # 전 자본분 매도(예: 0.072 BTC) 를 시도 → reduceOnly 가 막아 naked-short 는 방지
  # 되지만 매 신호마다 Binance -2022 거부 로그 도배 + 다전략 BTC 공유 포지션을
  # 임의 청산해 다른 전략 장부 깨뜨림 (one-way 모드). 실거래로 활성화 안 함.
  # - id: momo-btc-v2
  #   class: backtest.strategies.momo_btc_v2.MomoBtcV2
  #   kwargs:
  #     symbol: BTCUSDT      # cross-asset gate (#177); strategy holds on non-BTC bars
  #     sizing_mode: full
  #     # #238 — Binance aggTrade WS drives on_bar at dozens/sec. momo is a 15m
  #     # strategy; without this it re-emits an identical SELL every tick while
  #     # bearish divergence persists → -2019 Margin-insufficient order flood.
  #     # 900s = at most one signal per intended 15m bar. Default (0.0) is OFF
  #     # so backtests/Sharpe gate stay bit-identical; live opts in here.
  #     min_signal_interval_sec: 900
  #     # #238 — momo is single-ticker (NOT a LiveScannerMixin) so it had NO
  #     # auto stop/TP. Root incident: a naked -1 BTC short that ran with ZERO
  #     # stop because LivePositionRiskManager was long-only AND momo declared
  #     # no thresholds. scripts/live_run._register_exit_policies reads these
  #     # and builds a StopTpPolicy (handles long AND short). on_bar/backtest
  #     # never read them → 5y Sharpe gate stays bit-identical.
  #     stop_loss_pct: 0.03
  #     take_profit_pct: 0.06

