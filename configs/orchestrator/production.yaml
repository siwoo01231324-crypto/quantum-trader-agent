# Production strategy roster (#177).
#
# This file is bundled into qta.exe via qta.spec datas=[("configs", "configs")].
# Loaded by src.live.loop._load_orchestrator → src.portfolio.config_loader.load_orchestrator_from_yaml.
#
# Override path: qta.exe --production-yaml /path/to/custom.yaml
#
# Risk thresholds: NOT in this file. policy.yaml (risk DSL) is loaded separately
# via ShadowConfig.policy. See docs/specs/risk-rule-dsl.md and §7-2 of the
# whitepaper for the boilerplate Phase 1-2 policy.
#
# 5 baseline strategies + 메타라벨러 (#85) opt-in entry (commented).
strategies:
  # ── Crypto sleeve (Binance USDT-M Futures, 15m bars) ─────────────────────
  - id: momo-btc-v2
    class: backtest.strategies.momo_btc_v2.MomoBtcV2
    kwargs:
      symbol: BTCUSDT      # cross-asset gate (#177); strategy holds on non-BTC bars
      sizing_mode: full

  # ── Crypto sleeve (Binance USDT-M Futures, 4h bars, vol-filtered) ────────
  - id: momo-vol-filtered
    class: backtest.strategies.momo_vol_filtered.MomoVolFiltered
    kwargs: {}

  # ── Crypto sleeve (ETH/BTC, 1h bars, mean-reversion z-score) ─────────────
  - id: meanrev-pairs
    class: backtest.strategies.meanrev_pairs.MeanrevPairs
    kwargs: {}

  # ── KRX sleeve (KOSPI200 basket, EOD donchian breakout) ──────────────────
  - id: breakout-donchian
    class: backtest.strategies.breakout_donchian.BreakoutDonchian
    kwargs: {}

  # ── KRX sleeve (single stock 005930, 15m RSI divergence) ─────────────────
  - id: momo-kis-v1
    class: backtest.strategies.momo_kis_v1.MomoKisV1
    kwargs:
      symbol: "005930"
      sizing_mode: half-kelly

  # ── Universe-Scan strategies (#218) — broker 동적 universe 통합 후 활성화 ─
  #
  # 본 entries 는 config_loader 가 import + register 하지만, market_snapshot
  # ["ohlcv_history"] 에 universe 종목 OHLCV 가 없으면 cs_async_wrapper 가 graceful
  # warmup 또는 no_data 로 hold 반환 — broker 미연동 상태에서 zero impact.
  #
  # broker 통합 후 (universe-scan-broker-contract.md 참조) 실제 작동 — KIS 측은
  # fetch_universe_snapshot, Binance 측은 fetch_universe_klines 메서드 추가 필요.

  - id: cs-tsmom-kr-daily
    class: backtest.strategies.cs_async_wrapper.CrossSectionalAsyncStrategy
    kwargs:
      strategy_id: cs_tsmom_kr_daily
      module: backtest.strategies.cs_tsmom_kr_daily
      symbol: KRX_TOP350_BASKET
      rebal_freq: 5
      warmup_bars: 252
      weights_kind: krx
      params:
        top_n: 20
        min_turnover: 1000000000
        min_price: 1000

  - id: cs-rsi-div-kr
    class: backtest.strategies.cs_async_wrapper.CrossSectionalAsyncStrategy
    kwargs:
      strategy_id: cs_rsi_div_kr
      module: backtest.strategies.cs_rsi_div_kr
      symbol: KRX_TOP350_BASKET
      rebal_freq: 5
      warmup_bars: 40
      weights_kind: krx
      params:
        top_n: 20
        min_turnover: 1000000000
        min_price: 1000

  - id: cs-adx-ma-kr
    class: backtest.strategies.cs_async_wrapper.CrossSectionalAsyncStrategy
    kwargs:
      strategy_id: cs_adx_ma_kr
      module: backtest.strategies.cs_adx_ma_kr
      symbol: KRX_TOP350_BASKET
      rebal_freq: 5
      warmup_bars: 40
      weights_kind: krx_hlc
      params:
        top_n: 20
        min_turnover: 1000000000
        min_price: 1000

  - id: cs-tsmom-crypto-daily
    class: backtest.strategies.cs_async_wrapper.CrossSectionalAsyncStrategy
    kwargs:
      strategy_id: cs_tsmom_crypto_daily
      module: backtest.strategies.cs_tsmom_crypto_daily
      symbol: CRYPTO_TOP30_BASKET
      rebal_freq: 5
      warmup_bars: 252
      weights_kind: crypto
      params:
        top_n: 10
        min_quote_vol: 10000000

  - id: cs-rsi-div-crypto
    class: backtest.strategies.cs_async_wrapper.CrossSectionalAsyncStrategy
    kwargs:
      strategy_id: cs_rsi_div_crypto
      module: backtest.strategies.cs_rsi_div_crypto
      symbol: CRYPTO_TOP30_BASKET
      rebal_freq: 5
      warmup_bars: 40
      weights_kind: crypto
      params:
        top_n: 10
        min_quote_vol: 10000000

  - id: cs-macd-vol-crypto
    class: backtest.strategies.cs_async_wrapper.CrossSectionalAsyncStrategy
    kwargs:
      strategy_id: cs_macd_vol_crypto
      module: backtest.strategies.cs_macd_vol_crypto
      symbol: CRYPTO_TOP30_BASKET
      rebal_freq: 5
      warmup_bars: 40
      weights_kind: crypto
      params:
        top_n: 10
        min_quote_vol: 10000000
        vol_ceiling: 2.0

  # cs-bb-macd-kr 는 5y bench Sharpe -0.32 → status: inactive, production 미등록.
  # 코드는 src/backtest/strategies/cs_bb_macd_kr.py 유지 — score 정의 재설계 후 활성화 검토.

  # ── Live Universe Scanner strategies (#227) ──────────────────────────────
  #
  # **DEFAULT: ALL DISABLED.** 활성화는 다음 두 조건 모두 충족해야 한다:
  #   1. 환경 변수 LIVE_SCANNER_ENABLED=1 (live_run.py 가 LivePositionRiskManager 와이어업)
  #   2. 아래 entry 의 주석 해제 (config_loader 가 register_strategy 호출)
  #
  # 두 조건 모두 충족되면 orchestrator 가 LiveScannerMixin 전략을 universe 의 각
  # 종목마다 dispatch + LivePositionRiskManager 가 stop_loss/take_profit/trailing
  # 자동 청산. 활성화 전에는 universe-scan / single-ticker 전략만 동작 (zero impact).
  #
  # **5y backtest 미실시** — Sharpe ≥ 0.5 통과 검증 후 1건씩 활성화 권장 (#229 후속).
