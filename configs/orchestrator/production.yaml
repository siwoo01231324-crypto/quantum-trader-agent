# ── Capital allocation 정책 (#227 S7) ─────────────────────────────────────────
# 두 paradigm 동시 운영 시 자본 분배 의도. 현재는 informational metadata —
# 실제 강제는 risk evaluator 의 per-symbol concentration limit 가 담당.
# 합산 ≤ 100%. live_scanner 활성화 (LIVE_SCANNER_ENABLED=1) 후 검토.
capital_allocation:
  universe_scan_pct: 0.70   # cs_*, breakout_donchian
  live_scanner_pct: 0.30    # live_*  (활성화 전엔 0% 효과)
  single_ticker_pct: 0.00   # legacy momo_kis_v1 / momo_btc_v2 — 비활성 시
