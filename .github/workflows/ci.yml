name: CI — Broker Async Tests

# CI minutes optimization (2026-05-06):
# Broker pytest matrix (Linux + Windows, ~2분) → master push 만. PR 에서는
# pr-quick-check.yml 의 단일 pytest 가 broker tests 도 포함 (cov 없이 빠르게).
# Invariants 는 17초라 PR + master 둘 다 유지.

on:
  pull_request:
    paths:
      - "src/brokers/**"
      - "src/portfolio/**"
      - "tests/brokers/**"
      - "tests/integration/**"
      - "tests/performance/**"
      - "tests/conftest.py"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  push:
    branches: [master, "feat/000073-broker-async"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.os }})
    # CI minutes 절감: master push 만 (PR 은 pr-quick-check 가 담당)
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-cov

      - name: Run broker unit tests (not slow, not integration)
        run: |
          pytest tests/brokers/ -q -m "not slow and not integration" --tb=short

      - name: Coverage gate (src.brokers >= 85%)
        run: |
          pytest tests/brokers/ -q -m "not slow and not integration" --cov=src/brokers --cov-fail-under=85 --cov-report=term-missing

  invariants:
    name: Invariants check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml rdflib jsonschema python-frontmatter pydantic pyshacl

      - name: Check invariants
        run: python scripts/check_invariants.py --strict
