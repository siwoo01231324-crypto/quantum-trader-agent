name: CI — Broker Async Tests

on:
  pull_request:
    paths:
      - "src/brokers/**"
      - "src/portfolio/**"
      - "tests/brokers/**"
      - "tests/portfolio/**"
      - "tests/integration/**"
      - "tests/performance/**"
      - "tests/conftest.py"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  push:
    branches: [master, "feat/000073-broker-async"]

jobs:
  test:
    name: pytest (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx>=0.27 websockets>=12 respx>=0.21 pytest-asyncio>=0.23
          pip install -e ".[dev]"

      - name: Run broker unit tests (not slow, not integration)
        run: |
          pytest tests/brokers/ tests/portfolio/ -q -m "not slow and not integration" --tb=short

      - name: Coverage gate (src.brokers >= 85%)
        run: |
          pytest tests/brokers/ -q -m "not slow and not integration" --cov=src/brokers --cov-fail-under=85 --cov-report=term-missing

  invariants:
    name: Invariants check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml rdflib jsonschema python-frontmatter pydantic

      - name: Check invariants
        run: python scripts/check_invariants.py --strict
