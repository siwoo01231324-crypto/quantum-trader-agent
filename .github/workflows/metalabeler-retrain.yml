name: Metalabeler Weekly Retrain

on:
  schedule:
    - cron: '0 0 * * 1'   # 매주 월요일 00:00 UTC
  workflow_dispatch:
    inputs:
      strategy_id:
        description: 'Strategy ID to retrain'
        required: false
        default: 'momo-btc-v2'

env:
  STRATEGY_ID: ${{ inputs.strategy_id || 'momo-btc-v2' }}
  # Both project root (for `from src.xxx` imports) and src/ (for top-level
  # `from data_lake.xxx` etc) — covers all in-process and subprocess invocations.
  PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src
  # Unbuffered stdout/stderr so CI shows real-time progress (otherwise hangs
  # appear silent until the script finishes).
  PYTHONUNBUFFERED: "1"

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Compute date range (13 months)
        id: dates
        run: |
          END=$(date -u +%Y-%m-%d)
          START=$(date -u -d "13 months ago" +%Y-%m-%d 2>/dev/null || date -u -v-13m +%Y-%m-%d)
          YYYYMMDD=$(date -u +%Y%m%d)
          echo "start=$START" >> $GITHUB_OUTPUT
          echo "end=$END" >> $GITHUB_OUTPUT
          echo "yyyymmdd=$YYYYMMDD" >> $GITHUB_OUTPUT

      - name: Fetch candle data (Binance Vision — bypass api.binance.com geo-block)
        run: |
          python scripts/fetch_candles.py \
            --symbol BTCUSDT \
            --interval 15m \
            --start ${{ steps.dates.outputs.start }} \
            --end ${{ steps.dates.outputs.end }} \
            --source binance-vision \
            --output-dir lake/

      - name: Download previous manifest (first run allowed to fail)
        uses: actions/download-artifact@v4
        with:
          name: metalabeler-${{ env.STRATEGY_ID }}-prev
          path: prev-artifact/
        continue-on-error: true

      - name: Retrain metalabeler
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          PREV_MANIFEST=""
          if [ -f prev-artifact/manifest.json ]; then
            PREV_MANIFEST="--prev-manifest prev-artifact/manifest.json"
          fi
          # --bench: retrain script auto-limits bench to last 6 months
          # (~9K bars × 2 = ~6 min on ubuntu-latest, vs 15+ min for full 13mo).
          python scripts/retrain_metalabeler.py \
            --strategy-id ${{ env.STRATEGY_ID }} \
            --lake-dir lake/ \
            --symbol BTCUSDT \
            --interval 15m \
            $PREV_MANIFEST \
            --bench
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 1 ]; then
            exit 1
          fi
          # exit 2 (drift detected) → workflow continues, alert already sent by script
          exit 0

      - name: Upload new artifact
        uses: actions/upload-artifact@v4
        with:
          name: metalabeler-${{ env.STRATEGY_ID }}-${{ steps.dates.outputs.yyyymmdd }}
          path: models/${{ env.STRATEGY_ID }}/${{ steps.dates.outputs.yyyymmdd }}/
          retention-days: 90

      - name: Update prev pointer
        uses: actions/upload-artifact@v4
        with:
          name: metalabeler-${{ env.STRATEGY_ID }}-prev
          path: models/${{ env.STRATEGY_ID }}/${{ steps.dates.outputs.yyyymmdd }}/
          retention-days: 90
          overwrite: true

      - name: Upload retrain log
        uses: actions/upload-artifact@v4
        with:
          name: retrain-log-${{ steps.dates.outputs.yyyymmdd }}
          path: models/${{ env.STRATEGY_ID }}/retrain_logs/${{ steps.dates.outputs.yyyymmdd }}.md
          retention-days: 90
