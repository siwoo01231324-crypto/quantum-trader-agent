name: PR — Quick check (lightweight tests)

# CI minutes optimization (2026-05-06):
# PR 마다 가벼운 unit test 만 실행하여 회귀 검증. coverage 측정 / Backtest /
# PyInstaller / Broker matrix 같은 무거운 job 들은 master push 만 돌림 (#202
# 후속, GitHub Actions 90% 알림 대응).
#
# 실행 시간: ~3분 (cov 없이 1900+ pytest, ubuntu-only).
# Docs / .ai.md / 워크플로우 자체 변경만 포함된 PR 은 paths-ignore 로 skip.

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "**/.ai.md"
      - ".github/**"
      - "!.github/workflows/pr-quick-check.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-test:
    name: Quick pytest (no coverage)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests (fast, no coverage)
        run: |
          pytest tests/ \
            -m "not integration and not slow and not e2e_kis_paper" \
            -q --tb=short --no-header
