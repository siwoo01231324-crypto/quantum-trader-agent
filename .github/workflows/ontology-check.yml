name: Ontology & Frontmatter Check

on:
  pull_request:
    paths:
      - "docs/**"
      - "scripts/check_invariants.py"
      - "scripts/ontology_sync.py"
      - ".github/workflows/ontology-check.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml rdflib jsonschema python-frontmatter pydantic

      - name: Check invariants (strict)
        run: python scripts/check_invariants.py --strict

      - name: Frontmatter migration idempotency
        run: python scripts/migrate_frontmatter.py --dry-run

      - name: Ontology sync check
        run: python scripts/ontology_sync.py --check || echo "instances.ttl out of sync (warn)"
