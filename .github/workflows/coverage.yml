name: Coverage — 3-Layer Strategy

# CI minutes optimization (2026-05-06):
# Unit coverage (20min) + Backtest (5min) 는 master push 만. PR 에서는 별도
# 가벼운 pr-quick-check.yml 가 cov 없이 전체 pytest (3분) 실행 → 회귀는 잡되
# coverage % 측정은 master 1회로 절감 (#202 후속, GitHub Actions 90% 알림).

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/coverage.yml"
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write   # orgoro/coverage PR comment 권한
  checks: write

jobs:
  # -----------------------------------------------------------------------
  # Layer 1: Unit tests + full coverage report
  # -----------------------------------------------------------------------
  unit-coverage:
    name: Unit coverage
    runs-on: ubuntu-latest
    # CI minutes 절감: master push 만 (PR 에서는 pr-quick-check 가 cov 없이 실행)
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/ \
            -m "not integration and not slow and not e2e_kis_paper" \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            -q --tb=short

      # Coverage gates — informational in initial rollout (#132).
      # 본 PR 은 인프라 제공이 목적. 실제 임계 강화는 후속 PR 에서 점진 적용.
      - name: Coverage gate — overall (informational, target 70%)
        continue-on-error: true
        run: |
          pytest tests/ \
            -m "not integration and not slow and not e2e_kis_paper" \
            --cov=src \
            --cov-fail-under=70 \
            -q --no-header -rN

      - name: Coverage gate — core modules (informational, target 90%)
        continue-on-error: true
        run: |
          pytest tests/ \
            -m "not integration and not slow and not e2e_kis_paper" \
            --cov=src/risk \
            --cov=src/portfolio \
            --cov=src/brokers \
            --cov=src/backtest \
            --cov-fail-under=90 \
            -q --no-header -rN

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/

      - name: Coverage PR comment
        if: github.event_name == 'pull_request'
        continue-on-error: true   # 권한 fail 해도 unit-coverage job 자체 통과
        uses: orgoro/coverage@v3.2
        with:
          coverageFile: coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          thresholdAll: 0.70
          thresholdNew: 0.80
          thresholdModified: 0.80

  # -----------------------------------------------------------------------
  # Layer 2: Integration tests (network-dependent, informational only)
  # -----------------------------------------------------------------------
  integration:
    name: Integration tests (informational)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        run: |
          pytest tests/integration/ \
            -m "integration" \
            --cov=src \
            --cov-report=term-missing \
            -q --tb=short \
            --ignore=tests/integration/test_kis_paper.py \
            --ignore=tests/integration/test_binance_testnet.py \
            || true   # informational; allow no-tests-collected (exit 5)
        env:
          PYTEST_INTEGRATION: "1"

  # -----------------------------------------------------------------------
  # Layer 3: Backtest tests (deterministic simulation)
  # -----------------------------------------------------------------------
  backtest:
    name: Backtest layer tests
    runs-on: ubuntu-latest
    # CI minutes 절감: master push 만
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Coverage threshold informational in initial rollout (#132).
      # 현 backtest layer ~53% — 후속 PR 에서 점진 강화.
      - name: Run backtest tests with coverage
        continue-on-error: true
        run: |
          pytest tests/backtest/ \
            -m "not integration and not slow and not e2e_kis_paper" \
            --cov=src/backtest \
            --cov-report=term-missing \
            --cov-fail-under=50 \
            -q --tb=short

  # Coverage regression guard 제거 (2026-05-06):
  # unit-coverage 가 master push 만 돌게 되어 PR 에서 비교할 baseline 없음.
  # 회귀 검증은 pr-quick-check.yml 의 가벼운 pytest 가 담당. coverage % 추세는
  # master 머지 후 unit-coverage 산출물 (coverage.xml artifact) 로 확인.
