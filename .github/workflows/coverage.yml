name: Coverage — 3-Layer Strategy

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/coverage.yml"
  push:
    branches: [master]

jobs:
  # -----------------------------------------------------------------------
  # Layer 1: Unit tests + full coverage report
  # -----------------------------------------------------------------------
  unit-coverage:
    name: Unit coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/ \
            -m "not integration and not slow and not e2e_kis_paper" \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            -q --tb=short

      - name: Coverage gate — overall ≥ 70%
        run: |
          pytest tests/ \
            -m "not integration and not slow and not e2e_kis_paper" \
            --cov=src \
            --cov-fail-under=70 \
            -q --no-header -rN

      - name: Coverage gate — core modules ≥ 90%
        run: |
          pytest tests/ \
            -m "not integration and not slow and not e2e_kis_paper" \
            --cov=src/risk \
            --cov=src/portfolio \
            --cov=src/brokers \
            --cov=src/backtest \
            --cov-fail-under=90 \
            -q --no-header -rN

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/

      - name: Coverage PR comment
        if: github.event_name == 'pull_request'
        uses: orgoro/coverage@v3.2
        with:
          coverageFile: coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          thresholdAll: 0.70
          thresholdNew: 0.80
          thresholdModified: 0.80

  # -----------------------------------------------------------------------
  # Layer 2: Integration tests (network-dependent, informational only)
  # -----------------------------------------------------------------------
  integration:
    name: Integration tests (informational)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        run: |
          pytest tests/integration/ \
            -m "integration" \
            --cov=src \
            --cov-report=term-missing \
            -q --tb=short \
            --ignore=tests/integration/test_kis_paper.py \
            --ignore=tests/integration/test_binance_testnet.py
        env:
          PYTEST_INTEGRATION: "1"

  # -----------------------------------------------------------------------
  # Layer 3: Backtest tests (deterministic simulation)
  # -----------------------------------------------------------------------
  backtest:
    name: Backtest layer tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run backtest tests with coverage
        run: |
          pytest tests/backtest/ \
            --cov=src/backtest \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            -q --tb=short

  # -----------------------------------------------------------------------
  # Coverage regression guard — fails if coverage drops > 2pp vs baseline
  # -----------------------------------------------------------------------
  regression-guard:
    name: Coverage regression guard
    runs-on: ubuntu-latest
    needs: unit-coverage
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Download PR coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml
          path: pr-coverage/

      - name: Measure base branch coverage
        run: |
          git checkout ${{ github.base_ref }}
          pip install -e ".[dev]" -q
          pytest tests/ \
            -m "not integration and not slow and not e2e_kis_paper" \
            --cov=src \
            --cov-report=xml:base-coverage.xml \
            -q --no-header -rN 2>/dev/null || true

      - name: Regression check (max -2pp drop)
        run: |
          python - <<'EOF'
          import xml.etree.ElementTree as ET, sys

          def get_rate(path):
              try:
                  root = ET.parse(path).getroot()
                  cov = root.attrib
                  lines_valid = int(cov.get("lines-valid", 0))
                  lines_hit = int(cov.get("lines-hit", 0))
                  return lines_hit / lines_valid if lines_valid else 0.0
              except Exception:
                  return None

          base = get_rate("base-coverage.xml")
          pr = get_rate("pr-coverage/coverage.xml")

          if base is None or pr is None:
              print("Could not parse coverage XML — skipping regression check")
              sys.exit(0)

          diff_pp = (pr - base) * 100
          print(f"Base coverage: {base*100:.1f}%")
          print(f"PR coverage:   {pr*100:.1f}%")
          print(f"Delta:         {diff_pp:+.1f}pp")

          if diff_pp < -2.0:
              print(f"FAIL: coverage dropped {diff_pp:.1f}pp (threshold: -2pp)")
              sys.exit(1)
          else:
              print("PASS: coverage regression within threshold")
          EOF
