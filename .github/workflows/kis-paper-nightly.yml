name: KIS Paper Nightly E2E

on:
  schedule:
    # KRX 영업시간 중 (KST 월~금 10:00 = UTC 01:00) — 모의계좌 주문 검증을 위해 영업시간 내 발화.
    - cron: '0 1 * * 1-5'
  workflow_dispatch:

jobs:
  e2e-kis-paper:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      HANTOO_FAKE_API_KEY: ${{ secrets.HANTOO_FAKE_API_KEY }}
      HANTOO_FAKE_SECRET_API_KEY: ${{ secrets.HANTOO_FAKE_SECRET_API_KEY }}
      HANTOO_FAKE_CREDIT_NUMBER: ${{ secrets.HANTOO_FAKE_CREDIT_NUMBER }}
      HANTOO_HTS_ID: ${{ secrets.HANTOO_HTS_ID }}
      KIS_PAPER: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run KIS paper E2E tests
        run: pytest -m e2e_kis_paper -v --tb=short --junit-xml=reports/e2e-kis-paper.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-kis-paper-results-${{ github.run_id }}
          path: reports/e2e-kis-paper.xml
          retention-days: 30

  wal-concurrent-windows:
    name: WAL concurrent writers (Windows fsync)
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run WAL concurrent writer test
        run: pytest tests/ -k "wal_concurrent" -v --tb=short
