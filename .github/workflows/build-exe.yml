name: Build EXE — PyInstaller PoC

# Triggered on every PR merge to master (or manually for testing).
# Builds a single-file qta.exe on Windows and uploads it as a release artifact.
# Full AV scan and startup-latency measurement are documented in AC notes below.
#
# AC mapping:
#   AC1 (spec with asyncio/httpx/websockets/LightGBM deps) → qta.spec in repo
#   AC2 (< 200 MB, single .exe)                            → "Check EXE size" step
#   AC3 (< 10 s cold-start latency)                        → "Measure startup latency" step
#   AC4 (Windows 10/11 verified)                           → windows-latest runner (Win 2022)
#   AC5 (AV false-positive rate)                           → see note below
#   AC6 (CI integration)                                    → this workflow
#
# AC5 note: Automated AV scanning (Defender/Avast/Norton) requires manual
# or paid pipeline service (e.g. VirusTotal API). This workflow uses
# Windows Defender CLI (`MpCmdRun.exe`) for the free on-runner scan.
# Avast/Norton require separate licensed environments.

on:
  # CI minutes optimization (2026-05-06): pull_request 트리거 제거.
  # PR 마다 5분짜리 Windows EXE 빌드 안 돌리고, master 머지 후 1번만 빌드.
  # EXE 빌드 사고 발생 시 master 의 빨간 X + GitHub 이메일로 즉시 발견 →
  # hotfix 1번 추가 머지로 해결. 운영 중엔 새 EXE 배포가 적어서 PR 마다
  # 검증할 필요성 낮음. 긴급 검증 필요하면 workflow_dispatch 로 수동 실행.
  push:
    branches:
      - master
    paths:
      - "scripts/live_run.py"
      - "src/**"
      - "qta.spec"
      - ".github/workflows/build-exe.yml"
  workflow_dispatch:
    inputs:
      upload_release:
        description: "Upload as GitHub Release asset"
        required: false
        default: "false"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Releases "latest" rolling tag 갱신 + asset upload 에 contents:write 필요 (#214)
permissions:
  contents: write

jobs:
  build-exe:
    name: PyInstaller — Windows single EXE
    runs-on: windows-latest   # Windows Server 2022 (compatible Win 10/11 ABI)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install runtime + PyInstaller
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e "."
          pip install pyinstaller>=6.0 pyinstaller-hooks-contrib>=2024.0

      # UPX compressor — reduces EXE size by ~30-40%
      - name: Install UPX
        shell: pwsh
        run: |
          $upx = "$env:RUNNER_TOOL_CACHE\upx"
          if (-not (Test-Path $upx)) {
            $url = "https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip"
            Invoke-WebRequest -Uri $url -OutFile upx.zip
            Expand-Archive upx.zip -DestinationPath $upx
          }
          $upxBin = (Get-ChildItem $upx -Recurse -Filter upx.exe).DirectoryName
          echo "$upxBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build EXE
        shell: bash
        run: |
          pyinstaller qta.spec --noconfirm --clean
          ls -lh dist/

      # AC2: file size must be < 200 MB
      - name: Check EXE size (< 200 MB)
        shell: pwsh
        run: |
          $exe = "dist\qta.exe"
          $size = (Get-Item $exe).Length
          $sizeMB = [math]::Round($size / 1MB, 1)
          Write-Host "EXE size: ${sizeMB} MB"
          if ($size -gt 200MB) {
            Write-Error "FAIL: EXE size ${sizeMB} MB exceeds 200 MB limit"
            exit 1
          }
          Write-Host "PASS: ${sizeMB} MB < 200 MB"

      # AC3: cold-start latency + EXE actually runs (fail-blocking)
      - name: Measure startup latency + verify EXE runs
        shell: pwsh
        timeout-minutes: 2
        run: |
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          $output = & dist\qta.exe --help 2>&1
          $exitCode = $LASTEXITCODE
          $sw.Stop()
          $elapsed = [math]::Round($sw.Elapsed.TotalSeconds, 2)
          Write-Host "Cold-start latency: ${elapsed}s, exit=$exitCode"
          Write-Host "---OUTPUT---"
          Write-Output $output
          Write-Host "---END---"
          if ($exitCode -ne 0) {
            Write-Error "FAIL: qta.exe --help exited with code $exitCode (likely DLL/import error)"
            exit 1
          }
          if ($sw.Elapsed.TotalSeconds -gt 30) {
            Write-Warning "WARN: startup latency ${elapsed}s exceeds 30s target"
          } else {
            Write-Host "PASS: ${elapsed}s < 30s and EXE runs"
          }

      # Bundle integrity (#214) — fail-blocking. Catches qta.spec datas
      # regressions like #178 (docs/specs/strategies missing → empty grid).
      - name: Verify bundled assets (--check-bundle)
        shell: pwsh
        timeout-minutes: 1
        run: |
          $output = & dist\qta.exe --check-bundle 2>&1
          $exitCode = $LASTEXITCODE
          Write-Host "---OUTPUT---"
          Write-Output $output
          Write-Host "---END---"
          if ($exitCode -ne 0) {
            Write-Error "FAIL: --check-bundle reported missing assets"
            exit 1
          }

      # AC5 (partial): Windows Defender on-runner scan
      - name: Windows Defender scan
        shell: pwsh
        continue-on-error: true   # AV false-positives are informational, not blocking
        run: |
          $defender = "${env:ProgramFiles}\Windows Defender\MpCmdRun.exe"
          if (Test-Path $defender) {
            & $defender -Scan -ScanType 3 -File (Resolve-Path dist\qta.exe)
            Write-Host "Defender exit code: $LASTEXITCODE"
            if ($LASTEXITCODE -eq 2) {
              Write-Warning "Defender flagged the EXE as a threat (false positive likely). Review before release."
            }
          } else {
            Write-Host "Windows Defender CLI not found — skipping AV scan"
          }

      - name: Compute SHA256 checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist\qta.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  qta.exe" | Out-File -FilePath dist\qta.exe.sha256 -Encoding ascii
          Write-Host "SHA256: $hash"

      - name: Upload EXE artifact (CI history backup)
        uses: actions/upload-artifact@v4
        with:
          name: qta-exe-${{ github.sha }}
          path: |
            dist/qta.exe
            dist/qta.exe.sha256
          retention-days: 30

      # ── Releases "latest" rolling tag — master push 마다 자동 갱신 (#214) ────
      # 사용자는 항상 같은 URL 한 곳에서만 받음:
      #   https://github.com/${{ github.repository }}/releases/latest/download/qta.exe
      # GH artifact 처럼 7일 만료/계정 로그인 없음. master HEAD 와 EXE 가 결코
      # 어긋나지 않음 — 본 PR 머지 전엔 EXE 가 5/5 정체돼있던 사고(#178+#182+#198
      # 머지 후 EXE 미갱신) 의 영구 처방.
      - name: Move "latest" rolling tag to current commit
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push origin latest --force

      - name: Publish to GitHub Releases (latest)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "qta.exe — latest (master auto-build)"
          files: |
            dist/qta.exe
            dist/qta.exe.sha256
          prerelease: false
          make_latest: "true"
          body: |
            **자동 빌드** — master push 마다 갱신됨. 사용자는 항상 이 한 곳에서 다운로드:

            ```
            https://github.com/${{ github.repository }}/releases/latest/download/qta.exe
            ```

            ## 빌드 정보
            - commit: [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            - 메시지: ${{ github.event.head_commit.message }}
            - 빌드 시각: ${{ github.event.head_commit.timestamp }}
            - 검증: `--check-bundle` 통과 (전략 카탈로그 ≥ 5종 + production.yaml 번들)

            ## 사용법
            1. `qta.exe` 다운로드 → 원하는 폴더에 저장
            2. 같은 폴더 또는 상위 폴더에 `.env` 작성 (BINANCE_*, HANTOO_FAKE_* 등)
               — qta.exe 가 부모 디렉토리를 walk-up 하며 `.env` 자동 탐색 (#214)
            3. `qta.exe` 더블클릭 → 자동으로 http://localhost:8000 대시보드 오픈
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 수동 dispatch 모드는 별도 draft 릴리스로 분리 — latest 와 충돌 X
      - name: Upload to GitHub Release (manual dispatch only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.upload_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "exe-${{ github.sha }}"
          name: "EXE build ${{ github.sha }}"
          files: dist/qta.exe
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
