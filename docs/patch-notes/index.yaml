    tags: [feature]
    summary: >
      Cand-C 4-parallel deployment 활성화 + 레버리지 트레이딩용 ROI 직관 익절/손절.
    items:
      - "take_profit_roi/stop_loss_roi/leverage 3 kwargs 추가 — 가격 pct = ROI / leverage 자동 환산."
      - "cooldown_after_stop_sec 도입 (default 300s) — stop 청산 직후 churn 차단."
      - "live-scanner-mixin._apply_roi_targets 헬퍼로 4 전략 공통화."
