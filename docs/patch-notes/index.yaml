  - version: "v0.6.25"
    date: "2026-06-03"
    title: "/airborne 시뮬 캐시 — incomplete sim 영구 저장 차단 (4봉 미만 + TP/SL 없음 = None)"
    tags: [fix, safety]
    summary: >
      사용자 보고 (2026-06-02 NOMUSDT) — fire 직후 페이지 새로고침 시
      mainnet 봉이 1개만 닫혀 있어 ``_fetch_15m_bars(limit=4)`` 가 1봉만 받고
      ``_simulate_airborne_fire`` 가 그 결과를 ``timeout +0.04% bar_idx=1`` 로
      반환. ``AirborneSimCache.put_many`` 가 그대로 영속 저장 →
      ``put_many`` 의 dedup (``if key in self._cache: continue``) 이 한 번
      박힌 row 를 절대 갱신하지 않으므로 4봉 다 닫혀도 영원히 그 잘못된
      결과를 반환 → ``/api/airborne_metrics`` 의 win_rate / PF / timeout
