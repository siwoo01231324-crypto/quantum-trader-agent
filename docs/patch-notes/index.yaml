# QTA Patch Notes — newest first.
#
# Schema (per entry):
#   version: "vX.Y.Z"
#   date: "YYYY-MM-DD"             # KST release date
#   title: short headline
#   tags: [feature|fix|perf|chore|docs|safety]
#   summary: one-line elevator pitch
#   items:                          # bullet list shown on the page
#     - "..."
#   refs:                           # optional related docs/PRs/journals
