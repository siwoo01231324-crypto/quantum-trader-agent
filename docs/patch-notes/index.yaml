  - version: "v0.6.8"
    date: "2026-05-27"
    title: "cs-tsmom 분산 정책: top_n 10→30 + min_picks 3 가드"
    tags: [feature, safety]
    summary: >
      사용자 의도 "시드 capital_fraction (50%) 안에서 양수 score 종목 자유롭게
      비중 분배" 명확화. universe 전체 (top_n=30) 동일 가중 + 양수 < 3 이면 hold
      가드. ZEC 단독 50% 같은 단일 종목 집중 사고 차단.
    items:
      - "cs_async_wrapper.__init__ 에 min_picks 인자 추가 (default 0 = 가드 비활성, 기존 동작 byte-identical)."
      - "on_bar 가 양수 weight 종목 < min_picks 면 hold + latest_weights=None. basket_dispatcher 가 stale weights 로 dispatch 안 함."
      - "production.yaml cs-tsmom-crypto-daily: top_n 10→30 + min_picks 3."
      - "효과: 양수 10종 → 각 5%; 5종 → 각 10%; 3종 → 각 16.7%; 1~2종 → hold."
      - "회귀 박제 4건 (default_zero_no_regression / three_blocks_single_pick / three_allows_three_picks / invalid_min_picks_raises)."
      - "⚠️ 5y bench (top_n=10 기준 PF 1.32 / Sharpe 1.33) 보장 깨질 수 있음. paper 1~2주 모니터링 후 top_n=30 기준 재검증 필요."
    refs:
      - "src/backtest/strategies/cs_async_wrapper.py"
      - "configs/orchestrator/production.yaml"
      - "tests/test_cs_async_wrapper_capital_fraction.py"

