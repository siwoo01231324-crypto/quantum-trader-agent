  - version: "v0.6.22"
    date: "2026-06-02"
    title: "executor — REJECTED ack 를 WAL 에 기록 (`order_rejected` event_type), silent failure 진단 가능"
    tags: [fix, safety]
    summary: >
      v0.6.18 (PR #342) 의 shorts_allowed fix 후에도 자동매매 정상 작동 안 함.
      kst-hours 가 20,479 sell 시그널 emit 했지만 order_acked=0 — 모든 거래가
      REJECTED 인데 WAL 에 기록 0건 (silent failure). 원인:
      ``executor.py`` 의 ``if ack.status not in ("REJECTED",):`` 가 거부 ack
      를 WAL 에 안 적던 옛 동작. 사용자 보고 "거래 안 함" 의 진단을 어렵게 만든
      구조적 결함. 본 PR 은 진단 인프라 fix (실제 거부 사유 자체는 별도 PR).
    items:
      - "src/live/executor.py — REJECTED ack 를 새 event_type ``order_rejected`` 로 WAL 에 기록. ``ack.reject_reason`` (KILL_SWITCH / CONVERSION:... / BROKER_ERROR:... / -2022 / -2010 등) 함께 포함."
      - "별도 event_type 사용 이유: 기존 order_acked 는 dashboard /signals follow_up 가 'ordered' 로 분류함. REJECTED 가 order_acked 면 'ordered' 로 잘못 표시 → 그래서 분리."
      - "KILL_SWITCH / CONVERSION early-return 경로도 ``_write_rejected_wal`` 헬퍼로 WAL 기록 (이전 early-return 시에도 silent skip 됐음)."
      - "tests/live/test_executor_order_rejected_wal.py 신규 3 tests — broker REJECTED, 정상 ack byte-identical 보존, KILL_SWITCH 거부 사유 기록."
      - "기존 8 executor 테스트 회귀 0건."
      - "운영 영향: live_run.py 재시작 시 즉시 적용. 다음 sell 시그널 거부 시 WAL 에 reject_reason 기록 → 거부 사유 확인 후 별도 PR 로 실 발주 fix 진행 가능."
      - "Follow-up PR 예상: (1) ack.reject_reason 이 binance error code (-2022 등) 인지 확인 후 fix, (2) churn 차단 (kst-hours 의 매 tick 시그널 발화 cooldown), (3) dashboard /api/signals 에 order_rejected 도 follow_up 으로 노출."
    refs:
