    tags: [feat, safety]
    summary: >
      thin/변동성 큰 종목은 빠른 무빙에 시장가 손절이 라인보다 밀려 실현손실이
      −0.5%→−0.8%(=−8%ROE) 로 커진다(LWLG −8.75% 등 → 손익비 파괴). 슬리피지 ∝
      변동성이므로 변동성을 대리지표로 손절선을 buffer 만큼 *당겨* 밀려도 목표
      (−0.5%)에 안착시킨다. TP 는 resting limit 이라 슬립 무 → 안 건드림. factor=0
      기본(비활성, 기존 동작) — 청산 fill 미귀속으로 정밀측정 막혀 factor 는 라이브
      관찰로 튜닝(env AIRBORNE_SL_SLIP_FACTOR).
    items:
      - "protective_coordinator: sl_pct_eff = sl_pct − min(vol×factor, cap), 과당김 floor=sl_pct/2. volatility_provider(snapshot ohlcv 최근12봉 (H-L)/C 평균) 주입."
      - "loop.py: AIRBORNE_SL_SLIP_FACTOR(기본 0=off)/AIRBORNE_SL_SLIP_CAP_PCT(0.003) 배선. >0 시 로그."
