# Airborne SHORT-only Whitelist
#
# 본 파일은 ``scripts/refresh_airborne_short_whitelist.py`` 가 weekly 로 갱신
# 하며, 사람이 review 후 git commit 한다. daemon 은 ``status: active`` 인
# 종목만 발주 universe 로 사용. 상세 규칙은
# ``docs/specs/strategies/live-airborne-short-whitelist-v1.md`` 의
# "동적 Whitelist — Drift 대응" 섹션 참조.

version: 1
strategy_id: live-airborne-short-whitelist-v1
as_of: 2026-06-01
selection_method: hard_oos_train_funded
train_window: "2021-01-01..2023-12-31"
test_window: "2024-01-01..2025-12-31"
min_train_pf: 1.00
min_train_n: 50
entry_params:
  retrace_ratio: 0.6
  bb_window: 20
  bb_std: 2.0
  min_close_margin: 0.001
  atr_body_mult: 0.3
exit_params:
  stop_loss_pct: 0.03
  take_profit_pct: 0.06

# state 머신 ─ 매 weekly refresh 마다 갱신됨
#   status:
#     candidate  — 새로 진입 후보, 아직 활성화 X (shadow 모드)
#     active     — 운영 universe 포함 (실거래/testnet 둘 다)
#     warning    — 1주 PF<0.95, 다음 1주에 회복 못 하면 removed
#     removed    — 활성 X, history 보존
#   consecutive_pass / consecutive_fail — anti-churn 지속성 카운터
#
# 초기 21종 — Hard OOS train selection (2026-06-01)
